<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Toolbox</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>
            <i class="fa-solid fa-toolbox"></i>
            Developer Toolbox
        </h1>
        <p>Professional Frontend Utility Collection</p>
    </header>

    <div class="card">

        <!-- Tool Tabs -->
        <div class="tool-selector">

            <button class="tool active" data-tool="json">
                <i class="fa-solid fa-code"></i>
                JSON
            </button>

            <button class="tool" data-tool="base64">
                <i class="fa-solid fa-lock"></i>
                Base64
            </button>

            <button class="tool" data-tool="url">
                <i class="fa-solid fa-link"></i>
                URL
            </button>

            <button class="tool" data-tool="text">
                <i class="fa-solid fa-font"></i>
                Text
            </button>

        </div>

        <!-- Editors -->
        <div class="editor">

            <div class="editor-box">
                <label for="input">
                    <i class="fa-solid fa-pen"></i>
                    Input
                </label>

                <textarea
                    id="input"
                    placeholder="Enter your text here..."
                ></textarea>
            </div>

            <div class="editor-box">
                <label for="output">
                    <i class="fa-solid fa-file-lines"></i>
                    Output
                </label>

                <textarea
                    id="output"
                    readonly
                    placeholder="Result will appear here..."
                ></textarea>
            </div>

        </div>

        <!-- Buttons -->
        <div class="actions">

            <button id="encodeBtn" class="primary">
                <i class="fa-solid fa-play"></i>
                Encode
            </button>

            <button id="decodeBtn">
                <i class="fa-solid fa-rotate-left"></i>
                Decode
            </button>

            <button id="copyBtn">
                <i class="fa-solid fa-copy"></i>
                Copy
            </button>

            <button id="clearBtn">
                <i class="fa-solid fa-trash"></i>
                Clear
            </button>

        </div>

        <!-- Statistics -->
        <div class="stats">

            <div class="stat">
                <span id="characters">0</span>
                <small>Characters</small>
            </div>

            <div class="stat">
                <span id="words">0</span>
                <small>Words</small>
            </div>

            <div class="stat">
                <span id="lines">0</span>
                <small>Lines</small>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
